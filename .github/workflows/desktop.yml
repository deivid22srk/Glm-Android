name: Build desktop (Windows + Linux)

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-desktop:
    name: Windows desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cmd/desktop/frontend/package-lock.json
      - name: Install frontend deps
        working-directory: cmd/desktop/frontend
        run: npm ci
      - name: Build frontend
        working-directory: cmd/desktop/frontend
        run: npm run build
      - name: Run Go tests
        run: go test ./...
      - name: Build Wails desktop app
        run: npm run desktop:build
      - name: Create checksum
        shell: pwsh
        run: |
          $artifact = "build/bin/glm5.2proxy.exe"
          $hash = Get-FileHash -Algorithm SHA256 $artifact
          "$($hash.Hash.ToLower())  glm5.2proxy.exe" | Set-Content -Encoding ascii build/bin/glm5.2proxy.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: glm5.2proxy-windows-desktop
          path: |
            build/bin/glm5.2proxy.exe
            build/bin/glm5.2proxy.exe.sha256

  linux-desktop:
    name: Linux desktop
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev libglib2.0-dev
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cmd/desktop/frontend/package-lock.json
      - name: Install frontend deps
        working-directory: cmd/desktop/frontend
        run: npm ci
      - name: Build frontend
        working-directory: cmd/desktop/frontend
        run: npm run build
      - name: Run Go tests
        run: go test ./...
      - name: Build Wails desktop app
        run: npm run desktop:build
      - name: Package Linux binary
        run: |
          tar -C build/bin -czf build/bin/glm5.2proxy-linux-amd64.tar.gz glm5.2proxy
          sha256sum build/bin/glm5.2proxy-linux-amd64.tar.gz > build/bin/glm5.2proxy-linux-amd64.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: glm5.2proxy-linux-desktop
          path: |
            build/bin/glm5.2proxy-linux-amd64.tar.gz
            build/bin/glm5.2proxy-linux-amd64.tar.gz.sha256

  publish-release:
    name: Publish GitHub Release (desktop)
    runs-on: ubuntu-latest
    needs: [windows-desktop, linux-desktop]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: glm5.2proxy-windows-desktop
          path: release-assets/windows
      - uses: actions/download-artifact@v4
        with:
          name: glm5.2proxy-linux-desktop
          path: release-assets/linux
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows/glm5.2proxy.exe
            release-assets/windows/glm5.2proxy.exe.sha256
            release-assets/linux/glm5.2proxy-linux-amd64.tar.gz
            release-assets/linux/glm5.2proxy-linux-amd64.tar.gz.sha256
          generate_release_notes: true
